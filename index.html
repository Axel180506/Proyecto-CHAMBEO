<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAMBEO - LOGIN</title>
</head>
<body style="background-color: white; display: flex; align-items: center; justify-content: center; height: 100vh;">
    <main>
        <section id="formulario" style="border: 2px solid; text-align: center; color: #444444;width: 400px; height: 400px;">
            <h2 style="font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif ;color: #3d38f5;">CHAMBEO</h2>
            <p style="color: #444444; font-size: 12px;">Conectamos talento juvenil con oportunidades</p>
            <br>
            <input type="email" name="email" id="email" placeholder="Correo electrónico" required style="border-radius: 7px; border: 2px solid; color: #444444; width: 250px; height: 30px;">
            <br><br>
            <input type="password" name="clave" id="clave" placeholder="Contraseña" required style="border-radius: 7px; border: 2px solid; color: #444444; width: 250px; height: 30px;">
            <br><br>
            <button type="submit" name="enviar" style="background-color: #F59C27; color: white; border: 1px solid; border-radius: 7px; width: 250px; height: 30px; ">Iniciar sesión</button>
            <hr>
            <p style="color: #444444; font-size: 10px;">o continua con:</p>
            <button style="background-color: white;border-radius: 7px; border: 2px solid #444444; width: 120px; height: 30px;">Google</button>
            <button style="background-color: white;border-radius: 7px; border: 2px solid #444444; width: 120px; height: 30px;">Facebook</button>
            <p style="color: #444444; font-size: 12px;">¿No tienes cuenta?<b style="color: #3d38f5;"> Registrate</b></p>
        </section>
    </main>
</body>

</html>
