<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>

<body>
    <main>
        <section id="login">
            <form action="home.html" method="post">
                <h1>CHAMBEO</h1>
                <p>Crea tu cuenta y comienza tu camino</p>
                <p>¿Qué tipo de cuenta necesitas?</p>
                <input type="radio" name="tipo" id="estudiante">Estudiante
                <input type="radio" name="tipo" id="estudiante">Empleador
                <br><br>
                <input type="text" name="nombre" id="nombre" placeholder="Nombre Completo">
                <br><br>
                <input type="email" name="correo" id="correo" placeholder="Correo electronico">
                <br><br>
                <input type="password" name="clave" id="clave" maxlength="8" minlength="8" placeholder="Contraseña(minimo 8 caracteres)">
                <br><br>
                <input type="password" name="clave2" id="clave2" maxlength="8" minlength="8" placeholder="Confirmar contraseña">
                <br><br>
                <button type="submit">Crear cuenta</button>
                <hr>
                <p>O registrate con</p>
                <button type="submit"><a href="">Google</a></button>
                <button type="submit"><a href="https://www.facebook.com/">Facebook</a></button>
                <br>
                <p>¿Ya tienes cuenta?<a href="index.html"> Inicia sesión</a></p>
            </form>
        </section>
    </main>
</body>

</html>
