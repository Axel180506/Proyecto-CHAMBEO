<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro - CHAMBEO</title>
    <link rel="stylesheet" href="../../css/style2.css  ">
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRImCqYVkTjYDSIVlWDPi_AUOZ8jC6qwG8Wfw&s" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <main id="contenedor">
        <section class="fondo">
            <section id="registro">
                <form action="../index.html" method="post">
                    <br>
                    <h2>CHAMBEO</h2>
                    <br>
                    <p>Crea tu cuenta y comienza tu camino</p>
                    <br><br>
                    <label for="nombre">Nombre Completo</label>
                    <br>
                    <input type="text" name="nombre" id="nombre" placeholder="Nombre Completo" required>
                    <br><br>
                    <label for="correo">Correo electrónico</label>
                    <br>
                    <input type="email" name="correo" id="correo" placeholder="Correo electronico" required>
                    <br><br>
                    <label for="clave">Contraseña</label>
                    <br>
                    <input type="password" name="clave" id="clave" maxlength="8" minlength="8"
                        placeholder="Contraseña(minimo 8 caracteres)" required>
                    <br><br>
                    <label for="clave2">Verificar contraseña</label>
                    <br>
                    <input type="password" name="clave2" id="clave2" maxlength="8" minlength="8"
                        placeholder="Confirmar contraseña" required>
                    <br><br>
                    <button type="submit" id="buton"><i class="fas fa-user-plus"></i> Crear cuenta</button>
                    <br><br>
                    <p>O registrate con</p>
                    <br>
                    <button type="submit" class="boton"><i class="fab fa-google"></i> Google</button>
                    <button type="submit" class="boton"><i class="fab fa-facebook"></i> Facebook</button>
                    <br><br>
                    <p>¿Ya tienes cuenta?<a href="../index.html"> Inicia sesión</a></p>
                </form>
            </section>
        </section>
    </main>
</body>

</html>
