<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - CHAMBEO</title>
    <link rel="stylesheet" href="../css/style2.css">
</head>

<body>
    <main id="contenedor">
        <section class="fondo">
            <section id="login">
                <form action="home.html" method="post">
                    <br>
                    <h2>CHAMBEO</h2>
                    <br>
                    <p>Conectamos talento juvenil con oportunidades</p>
                    <br>
                    <label for="correo">Correo electrónico:</label><br><br>
                    <input type="email" name="correo" id="correo" placeholder="Correo electronico:" required>
                    <br><br>
                    <label for="clave">Contraseña</label><br><br>
                    <input type="password" name="clave" id="clave" maxlength="8" minlength="8" placeholder="Contraseña:"
                        required>
                    <br><br>
                    <button type="submit" id="buton">Iniciar Sesión</button><br><br>
                    <p>O continúa con</p><br>
                    <button type="submit" class="boton"><a href="https://accounts.google.com/" target="_blank">Google</a></button>
                    <button type="submit" class="boton"><a href="https://www.facebook.com/" target="_blank">Facebook</a></button>
                    <br><br>
                    <p>¿No tienes cuenta?<a href="../Paginas/registro/registro.html"> Registrate</a></p>
                </form>
            </section>
        </section>
    </main>
</body>

</html>
