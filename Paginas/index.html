<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - CHAMBEO</title>
    <link rel="stylesheet" href="../css/style2.css">
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRImCqYVkTjYDSIVlWDPi_AUOZ8jC6qwG8Wfw&s" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <main id="contenedor">
        <section class="fondo">
            <section id="login">
                <form action="../Paginas/home/home.html" method="post">
                    <br>
                    <h2>CHAMBEO</h2>
                    <br>
                    <p>Conectamos talento juvenil con oportunidades</p>
                    <br>
                    <label for="correo">Correo electrónico:</label><br><br>
                    <input type="email" name="correo" id="correo" placeholder="Correo electronico:" required>
                    <br><br>
                    <label for="clave">Contraseña</label><br><br>
                    <input type="password" name="clave" id="clave" maxlength="8" minlength="8" placeholder="Contraseña:"
                        required>
                    <br><br>
                    <button type="submit" id="buton"> <i class="fas fa-sign-in-alt"></i> Iniciar Sesión</button><br><br>
                    <p>O continúa con</p><br>
                    <button type="submit" class="boton"><i class="fab fa-google"></i> Google</button>
                    <button type="submit" class="boton"><i class="fab fa-facebook"></i> Facebook</button>
                    <br><br>
                    <p>¿No tienes cuenta?<a href="../Paginas/registro/registro.html"> Registrate</a></p>
                </form>
            </section>
        </section>
    </main>
</body>

</html>
